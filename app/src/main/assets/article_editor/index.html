<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="quill.snow.css">
  <style>
    :root {
      color-scheme: light;
      --page: #f8f1e7;
      --panel: rgba(255, 252, 246, 0.96);
      --card: #fffdf8;
      --border: #d9d3ca;
      --ink: #231f1a;
      --muted: #75695d;
      --accent: #9d4f21;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(157, 79, 33, 0.08), transparent 28%),
        linear-gradient(180deg, #fffdf8 0%, var(--page) 100%);
      color: var(--ink);
      font-family: sans-serif;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
    }

    .toolbar-shell,
    .table-shell {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 14px 36px rgba(35, 31, 26, 0.08);
    }

    .toolbar-shell {
      overflow: visible;
      position: relative;
      z-index: 5;
    }

    #toolbar {
      border: 0;
      background: transparent;
      overflow: visible;
    }

    .table-shell {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .table-toggle,
    .table-actions button {
      border: 1px solid var(--border);
      background: #f4ede2;
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.1;
    }

    .table-toggle {
      align-self: flex-start;
      background: #efe3d1;
      font-weight: 600;
    }

    .table-actions {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
    }

    .table-shell.is-open .table-actions {
      display: flex;
    }

    #editor-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(35, 31, 26, 0.08);
    }

    #editor {
      min-height: 60vh;
      font-size: 16px;
    }

    .ql-toolbar.ql-snow {
      border: 0;
      border-bottom: 1px solid var(--border);
      padding: 12px;
      background: transparent;
      overflow: visible;
      position: relative;
      z-index: 2;
    }

    .ql-container.ql-snow {
      border: 0;
      background: transparent;
    }

    .ql-editor {
      min-height: 56vh;
      padding: 20px 18px 96px;
      color: var(--ink);
      line-height: 1.7;
    }

    .ql-editor.ql-blank::before {
      color: var(--muted);
      font-style: normal;
      left: 18px;
      right: 18px;
    }

    .ql-editor h1,
    .ql-editor h2,
    .ql-editor h3 {
      margin: 22px 0 10px;
      line-height: 1.2;
    }

    .ql-editor p {
      margin-bottom: 12px;
    }

    .ql-editor blockquote {
      border-left-color: var(--accent);
      color: #5f4a37;
      margin: 18px 0;
    }

    .ql-editor img {
      max-width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
      margin: 16px auto;
    }

    .ql-editor table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      margin: 18px 0;
      background: #fff;
    }

    .ql-editor table td {
      border: 1px solid #cdbfab;
      min-width: 84px;
      padding: 10px 12px;
      vertical-align: top;
    }

    .ql-editor .ql-video {
      width: 100%;
      min-height: 220px;
      border-radius: 18px;
    }

    .ql-snow .ql-picker {
      position: relative;
    }

    .ql-snow .ql-picker.ql-expanded .ql-picker-options {
      z-index: 20;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar-shell">
      <div id="toolbar">
        <span class="ql-formats">
          <select class="ql-header">
            <option selected></option>
            <option value="1"></option>
            <option value="2"></option>
            <option value="3"></option>
          </select>
        </span>
        <span class="ql-formats">
          <button class="ql-bold"></button>
          <button class="ql-italic"></button>
          <button class="ql-underline"></button>
          <button class="ql-strike"></button>
          <button class="ql-blockquote"></button>
          <button class="ql-link"></button>
        </span>
        <span class="ql-formats">
          <button class="ql-list" value="ordered"></button>
          <button class="ql-list" value="bullet"></button>
          <button class="ql-indent" value="-1"></button>
          <button class="ql-indent" value="+1"></button>
        </span>
        <span class="ql-formats">
          <button class="ql-image"></button>
          <button class="ql-video"></button>
          <button class="ql-clean"></button>
        </span>
      </div>
    </div>

    <div class="table-shell">
      <button type="button" class="table-toggle" onclick="EncyeEditor.toggleTableTools()">Table tools</button>
      <div class="table-actions" id="table-actions">
        <button type="button" onclick="EncyeEditor.insertTable()">Insert table</button>
        <button type="button" onclick="EncyeEditor.insertRowAbove()">Row above</button>
        <button type="button" onclick="EncyeEditor.insertRowBelow()">Row below</button>
        <button type="button" onclick="EncyeEditor.insertColumnLeft()">Col left</button>
        <button type="button" onclick="EncyeEditor.insertColumnRight()">Col right</button>
        <button type="button" onclick="EncyeEditor.deleteRow()">Delete row</button>
        <button type="button" onclick="EncyeEditor.deleteColumn()">Delete col</button>
        <button type="button" onclick="EncyeEditor.deleteTable()">Delete table</button>
      </div>
    </div>

    <div id="editor-container">
      <div id="editor"></div>
    </div>
  </div>

  <script src="quill.js"></script>
  <script>
    (function () {
      let syncingHtml = false;
      const tableShell = document.querySelector('.table-shell');

      const quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Start writing your article...',
        modules: {
          table: true,
          history: {
            userOnly: true
          },
          toolbar: {
            container: '#toolbar',
            handlers: {
              image() {
                if (window.AndroidEditorBridge && typeof window.AndroidEditorBridge.requestInlineImage === 'function') {
                  window.AndroidEditorBridge.requestInlineImage();
                }
              }
            }
          }
        }
      });

      function normalize(html) {
        return (html || '')
          .replace(/<(script|style)[^>]*>.*?<\/\1>/gis, '')
          .replace(/<p>(\s|&nbsp;|<br\s*\/?>)*<\/p>$/gi, '')
          .trim();
      }

      function notifyChange() {
        if (syncingHtml) return;
        if (window.AndroidEditorBridge && typeof window.AndroidEditorBridge.onHtmlChanged === 'function') {
          window.AndroidEditorBridge.onHtmlChanged(EncyeEditor.getHtml());
        }
      }

      window.EncyeEditor = {
        setHtml(html) {
          syncingHtml = true;
          quill.setText('', 'silent');
          if (html && html.trim().length > 0) {
            quill.clipboard.dangerouslyPasteHTML(0, normalize(html), 'silent');
          }
          syncingHtml = false;
          notifyChange();
        },
        getHtml() {
          return normalize(quill.root.innerHTML);
        },
        insertImage(url) {
          if (!url) return;
          const range = quill.getSelection(true);
          const index = range ? range.index : quill.getLength();
          quill.insertEmbed(index, 'image', url, 'user');
          quill.setSelection(index + 1, 0, 'silent');
          notifyChange();
        },
        insertTable() {
          const table = quill.getModule('table');
          if (table) {
            table.insertTable(2, 2);
            notifyChange();
          }
        },
        insertRowAbove() {
          const table = quill.getModule('table');
          if (table) table.insertRowAbove();
        },
        insertRowBelow() {
          const table = quill.getModule('table');
          if (table) table.insertRowBelow();
        },
        insertColumnLeft() {
          const table = quill.getModule('table');
          if (table) table.insertColumnLeft();
        },
        insertColumnRight() {
          const table = quill.getModule('table');
          if (table) table.insertColumnRight();
        },
        deleteRow() {
          const table = quill.getModule('table');
          if (table) table.deleteRow();
        },
        deleteColumn() {
          const table = quill.getModule('table');
          if (table) table.deleteColumn();
        },
        deleteTable() {
          const table = quill.getModule('table');
          if (table) table.deleteTable();
        },
        toggleTableTools() {
          tableShell.classList.toggle('is-open');
        },
        focus() {
          quill.focus();
        }
      };

      quill.on('text-change', notifyChange);
      quill.on('selection-change', function (range) {
        if (range) {
          notifyChange();
        }
      });
    })();
  </script>
</body>
</html>
