name: Manual Android Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build variant to assemble
        required: true
        default: debug
        type: choice
        options:
          - debug
          - release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      GRADLE_TASK: ${{ inputs.build_type == 'release' && ':app:assembleRelease' || ':app:assembleDebug' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Assemble selected build
        run: ./gradlew $GRADLE_TASK

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ inputs.build_type }}-apk
          path: app/build/outputs/apk/${{ inputs.build_type }}/app-${{ inputs.build_type }}.apk
          if-no-files-found: error
